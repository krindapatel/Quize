<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz App with Timer</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    width: 400px;
    max-width: 95%;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.hidden {
    display: none;
}

h1, h2 {
    text-align: center;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

.start-btn, .restart-btn {
    background: #667eea;
    color: white;
}

.option-btn {
    background: #f1f1f1;
}

.option-btn:hover {
    background: #ddd;
}

.correct {
    background: #4CAF50 !important;
    color: white;
}

.wrong {
    background: #f44336 !important;
    color: white;
}

.header {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 10px;
}

.timer {
    font-weight: bold;
    color: #f44336;
}

.next-btn {
    background: #333;
    color: white;
}
</style>
</head>
<body>

<div class="container">

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>Quiz App</h1>
        <p>You have 10 seconds per question.</p>
        <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
        <div class="header">
            <div id="question-number"></div>
            <div class="timer">Time Left: <span id="time">10</span>s</div>
        </div>

        <h2 id="question-text"></h2>
        <div id="options"></div>
        <button class="next-btn hidden" onclick="nextQuestion()">Next</button>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden">
        <h2>Quiz Completed 🎉</h2>
        <p id="score-text"></p>
        <button class="restart-btn" onclick="restartQuiz()">Restart Quiz</button>
    </div>

</div>

<script>

const questions = [
    {
        question: "Which language runs in a web browser?",
        options: ["Java", "C", "Python", "JavaScript"],
        answer: 3
    },
    {
        question: "What does CSS stand for?",
        options: [
            "Central Style Sheets",
            "Cascading Style Sheets",
            "Cascading Simple Sheets",
            "Cars SUVs Sailboats"
        ],
        answer: 1
    },
    {
        question: "What does HTML stand for?",
        options: [
            "Hypertext Markup Language",
            "Hypertext Markdown Language",
            "Hyperloop Machine Language",
            "Helicopters Terminals Motorboats Lamborginis"
        ],
        answer: 0
    }
];

let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 10;
let answered = false;

const startScreen = document.getElementById("start-screen");
const quizScreen = document.getElementById("quiz-screen");
const resultScreen = document.getElementById("result-screen");
const questionText = document.getElementById("question-text");
const optionsContainer = document.getElementById("options");
const questionNumber = document.getElementById("question-number");
const timeDisplay = document.getElementById("time");
const nextBtn = document.querySelector(".next-btn");

function startQuiz() {
    startScreen.classList.add("hidden");
    quizScreen.classList.remove("hidden");
    currentQuestion = 0;
    score = 0;
    loadQuestion();
}

function loadQuestion() {
    resetState();
    let q = questions[currentQuestion];
    questionText.innerText = q.question;
    questionNumber.innerText = Question ${currentQuestion + 1} of ${questions.length};
    
    q.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.innerText = option;
        button.classList.add("option-btn");
        button.onclick = () => selectAnswer(index);
        optionsContainer.appendChild(button);
    });

    startTimer();
}

function resetState() {
    clearInterval(timer);
    timeLeft = 10;
    timeDisplay.innerText = timeLeft;
    optionsContainer.innerHTML = "";
    nextBtn.classList.add("hidden");
    answered = false;
}

function startTimer() {
    timer = setInterval(() => {
        timeLeft--;
        timeDisplay.innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(timer);
            showCorrectAnswer();
            nextBtn.classList.remove("hidden");
        }
    }, 1000);
}
function selectAnswer(index) {
    if (answered) return;

    answered = true;
    clearInterval(timer);

    const buttons = document.querySelectorAll(".option-btn");
    const correctIndex = questions[currentQuestion].answer;

    if (index === correctIndex) {
        buttons[index].classList.add("correct");
        score++;
    } else {
        buttons[index].classList.add("wrong");
        buttons[correctIndex].classList.add("correct");
    }

    nextBtn.classList.remove("hidden");
}

function showCorrectAnswer() {
    const buttons = document.querySelectorAll(".option-btn");
    const correctIndex = questions[currentQuestion].answer;
    buttons[correctIndex].classList.add("correct");
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < questions.length) {
        loadQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    quizScreen.classList.add("hidden");
    resultScreen.classList.remove("hidden");
    document.getElementById("score-text").innerText =
        You scored ${score} out of ${questions.length};
}

function restartQuiz() {
    resultScreen.classList.add("hidden");
    startScreen.classList.remove("hidden");
}

</script>

</body>
</html>
